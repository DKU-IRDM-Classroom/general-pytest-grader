name: "general-pytest-grader"
description: "General PyTest Grader"
author: "DKU-IRDM-Classroom"

inputs:
  module-path:
    required: true
  time-limit:
    required: false
    default: 2

permissions:
  contents: read
  actions: read
  checks: write

runs:
  using: "composite"
  steps:

    - name: 환경 준비
      id: prepare-grader
      shell: bash
      run: |
        : 환경 준비
        set -euo pipefail

        python -m pip install -qq --disable-pip-version-check pytest pytest-timeout

        mkdir -p "$HOME/workdir"
        chmod 777 "$HOME/workdir"

    - name: 테스트 수집
      id: collect-tests
      shell: bash
      run: |
        : 테스트 수집
        set -euo pipefail

        cp ./*.py "$HOME/workdir/"
        cp "${{ inputs.module-path }}/test_cases.py" "$HOME/workdir/"

        cd "$HOME/workdir"
        pytest test_cases.py --collect-only --quiet | head > ./nodeids.txt
        TOTAL=$(wc -l < ./nodeids.txt)

        echo "TOTAL=$TOTAL" >> "$GITHUB_ENV"

    - name: 채점
      id: grade
      shell: bash
      run: |
        : 채점
        set -euo pipefail

        cd "$HOME/workdir"

        PASS=0

        for n in $(seq 1 ${{ env.TOTAL }}); do

          NODEID=$(sed -n "${n}p" ./nodeids.txt | xargs)

          set +e
          pytest "$NODEID" \
            --quiet \
            --tb=no \
            --disable-warnings \
            --timeout=${{ inputs.time-limit }} \
            --timeout-method=thread \
            --junitxml=report.xml \
            >/dev/null 2>&1
          RC=$?
          set -e

          NODENAME="${NODEID##*::}"
          if [ "$RC" -eq 0 ]; then
            echo "[Case ${n}] 테스트 성공 (PASS) <${NODENAME}>"
            PASS=$((PASS+1))
          else
            if [ -f ./report.xml ] && grep -q "Timeout" ./report.xml; then
              echo "[Case ${n}] 시간 초과 (TLE) <${NODENAME}>"
            else
              echo "[Case ${n}] 테스트 실패 (FAIL) <${NODENAME}>"
            fi
          fi

        done

        echo "::notice::점수 ${PASS}/${{ env.TOTAL }}"
        echo "::notice title=Autograding report::{\"totalPoints\":${PASS},\"maxPoints\":${{ env.TOTAL }}}"
